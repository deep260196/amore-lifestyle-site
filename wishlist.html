<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Wishlist | Amore Lifestyle</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,500;0,600;1,400;1,500&family=Work+Sans:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ivory:#F3EFE8;--blush:#E6DFD1;--plum:#6E6E6E;--rose:#6E6E6E;--gold:#A68A5B;--ink:#2B2B2A;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--ivory);color:var(--ink);font-family:'Work Sans',sans-serif;line-height:1.5;}
  h1,h2,h4{font-family:'Fraunces',serif;font-weight:500;letter-spacing:-0.01em;}
  a{color:inherit;text-decoration:none;}
  .wrap{max-width:1240px;margin:0 auto;padding:0 32px;}

  header{position:sticky;top:0;z-index:50;background:var(--ivory);border-bottom:1px solid rgba(33,26,29,.1);}
  .top-bar{display:flex;align-items:center;justify-content:space-between;padding:14px 32px;max-width:1240px;margin:0 auto;flex-wrap:wrap;}
  .logo img{height:38px;display:block;}
  .icons{display:flex;gap:16px;align-items:center;font-size:12px;}
  .bag-count,.wishlist-count{display:inline-block;min-width:15px;height:15px;line-height:15px;text-align:center;background:var(--rose);color:var(--ivory);border-radius:50%;font-size:9px;margin-left:2px;}

  .page-head{padding:28px 0 8px;}
  .page-head .tag{font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--rose);}
  .page-head h1{font-size:clamp(24px,3vw,32px);margin-top:6px;}

  .products{display:grid;grid-template-columns:repeat(4,1fr);gap:20px;padding:24px 0 60px;}
  .card{position:relative;}
  .card-img{aspect-ratio:1/1.05;border-radius:4px;overflow:hidden;position:relative;margin-bottom:16px;}
  .swatch-1{background:linear-gradient(145deg,#E6DFD1,#C9622D);}
  .swatch-2{background:linear-gradient(145deg,#EDE6DA,#A68A5B);}
  .swatch-3{background:linear-gradient(145deg,#3A3A3A,#545454);}
  .swatch-4{background:linear-gradient(145deg,#E6DFD1,#A68A5B);}
  .fav{
    position:absolute;top:12px;right:12px;z-index:3;width:30px;height:30px;border-radius:50%;
    background:rgba(251,246,241,.85);display:flex;align-items:center;justify-content:center;
    font-size:14px;cursor:pointer;border:none;
  }
  .card h4{font-size:15px;font-weight:500;margin-bottom:8px;}
  .price-tag{
    display:inline-flex;align-items:center;gap:6px;font-family:'Space Mono',monospace;font-size:13px;
    border:1px dashed var(--gold);padding:5px 10px 5px 8px;border-radius:3px;
  }
  .add-cart{
    margin-top:14px;width:100%;text-align:center;padding:11px 0;border:1px solid var(--ink);font-size:12px;
    letter-spacing:.06em;text-transform:uppercase;border-radius:2px;transition:all .2s;background:none;cursor:pointer;font-family:'Work Sans';
  }
  .add-cart:hover{background:var(--ink);color:var(--ivory);}

  .empty-state{padding:60px 0;text-align:center;}
  .empty-state p{opacity:.7;margin-bottom:20px;}
  .btn{display:inline-block;padding:13px 26px;font-size:12px;letter-spacing:.06em;text-transform:uppercase;border-radius:2px;cursor:pointer;border:1px solid var(--ink);background:var(--ink);color:var(--ivory);}
  .btn:hover{background:var(--rose);border-color:var(--rose);}

  footer{padding:44px 0 28px;text-align:center;font-size:12px;opacity:.7;}

  @media (max-width:900px){.products{grid-template-columns:repeat(2,1fr);}}
</style>
</head>
<body>

<header>
  <div class="top-bar">
    <a href="index.html" class="logo"><img src="logo.png?v=3" alt="Amore Lifestyle"></a>
    <div class="icons">
      <a href="wishlist.html">Wishlist <span class="wishlist-count">0</span></a>
      <a href="account.html">Account</a>
      <a href="bag.html">Bag <span class="bag-count">0</span></a>
    </div>
  </div>
</header>

<div class="wrap page-head">
  <div class="tag">Saved For Later</div>
  <h1>Your Wishlist</h1>
</div>

<div class="wrap">
  <div class="products" id="wishGrid"></div>
</div>

<footer>
  <div class="wrap">© 2026 Amore Lifestyle · Ahmedabad, Gujarat, India</div>
</footer>

<script src="products.js?v=4"></script>
<script src="cart.js?v=3"></script>
<script>
  function render(){
    if (typeof PRODUCTS === 'undefined'){
      document.getElementById('wishGrid').parentElement.innerHTML = `
        <div class="empty-state">
          <h2 style="margin-bottom:10px;">Something didn't load right.</h2>
          <p>This page needs products.js and cart.js to be in the same folder as this page. Please check both files are uploaded, then refresh.</p>
        </div>`;
      return;
    }
    const ids = getWishlist();
    const grid = document.getElementById('wishGrid');

    if (ids.length === 0){
      grid.innerHTML = '';
      grid.parentElement.innerHTML = `
        <div class="empty-state">
          <h2 style="margin-bottom:10px;">Nothing saved yet.</h2>
          <p>Tap the heart on any product to save it here for later.</p>
          <a href="categories.html" class="btn">Browse Categories</a>
        </div>`;
      return;
    }

    grid.innerHTML = ids.map(id => {
      const p = PRODUCTS.find(pr => pr.id === id);
      if (!p) return '';
      return `
        <div class="card">
          <a href="buy.html?id=${p.id}">
            <div class="card-img ${p.swatch}">
              <button class="fav" onclick="event.preventDefault();removeWish(${p.id})">♥</button>
            </div>
            <h4>${p.name}</h4>
          </a>
          <div class="price-tag">₹ ${p.price.toLocaleString('en-IN')}</div>
          <button class="add-cart" onclick="addToBag(${p.id});this.textContent='Added ✓';setTimeout(()=>this.textContent='Add to Bag',900);">Add to Bag</button>
        </div>`;
    }).join('');
  }

  function removeWish(id){
    toggleWishlist(id);
    render();
  }

  render();
</script>
</body>
</html>
