<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buy | Amore Lifestyle</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,500;0,600;1,400;1,500&family=Work+Sans:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ivory:#F3EFE8;
    --blush:#E6DFD1;
    --plum:#6E6E6E;
    --rose:#6E6E6E;
    --gold:#A68A5B;
    --ink:#2B2B2A;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{overflow-x:hidden;max-width:100%;}
  body{background:var(--ivory);color:var(--ink);font-family:'Work Sans',sans-serif;line-height:1.5;}
  h1,h2,h3{font-family:'Fraunces',serif;font-weight:500;letter-spacing:-0.01em;}
  a{color:inherit;text-decoration:none;}
  .wrap{max-width:1100px;margin:0 auto;padding:0 32px;}

  header{position:sticky;top:0;z-index:50;background:var(--ivory);border-bottom:1px solid rgba(33,26,29,.1);}
  .top-bar{display:flex;align-items:center;gap:8px;padding:14px 32px;max-width:1240px;margin:0 auto;flex-wrap:wrap;}
  .logo{font-family:'Fraunces',serif;font-style:italic;font-weight:500;font-size:18px;color:var(--plum);}
  .logo span{color:var(--rose);font-style:normal;}
  .icons{display:flex;gap:16px;align-items:center;font-size:12px;flex-wrap:wrap;}
  .bag-count,.wishlist-count{display:inline-block;min-width:15px;height:15px;line-height:15px;text-align:center;background:var(--rose);color:var(--ivory);border-radius:50%;font-size:9px;margin-left:2px;}

  .breadcrumb{padding:20px 0 0;font-size:12px;opacity:.65;}
  .breadcrumb a:hover{color:var(--rose);}

  .product{
    display:grid;grid-template-columns:1fr 1fr;gap:52px;
    padding:24px 0 60px;align-items:start;
  }
  .product-gallery{max-width:380px;margin:0 auto;width:100%;}
  .product-img{
    aspect-ratio:1/1;border-radius:10px;
    display:flex;align-items:center;justify-content:center;
    font-size:96px;position:relative;
    box-shadow:0 6px 20px rgba(33,26,29,.08);
    overflow:hidden;
  }
  .product-img img{width:100%;height:100%;object-fit:cover;}
  .product-img .badge{
    position:absolute;top:16px;left:16px;
    background:var(--ivory);color:var(--plum);
    font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.08em;text-transform:uppercase;
    padding:5px 10px;border-radius:20px;
  }
  .thumb-row{display:flex;gap:10px;margin-top:12px;justify-content:center;flex-wrap:wrap;}
  .thumb{
    width:60px;height:60px;border-radius:6px;cursor:pointer;
    border:2px solid transparent;overflow:hidden;flex:0 0 auto;
  }
  .thumb img{width:100%;height:100%;object-fit:cover;display:block;}
  .thumb.active{border-color:var(--ink);}
  .swatch-1{background:linear-gradient(145deg,#E6DFD1,#C9622D);}
  .swatch-2{background:linear-gradient(145deg,#EDE6DA,#A68A5B);}
  .swatch-3{background:linear-gradient(145deg,#3A3A3A,#545454);}
  .swatch-4{background:linear-gradient(145deg,#E6DFD1,#A68A5B);}

  .info .tag{font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--rose);}
  .info h1{font-size:clamp(24px,3vw,32px);margin:8px 0 12px;}
  .price-row{display:flex;align-items:baseline;gap:10px;margin-bottom:18px;}
  .price{font-family:'Space Mono',monospace;font-size:22px;}
  .price-strike{font-family:'Space Mono',monospace;font-size:14px;opacity:.5;text-decoration:line-through;}
  .save{font-size:11px;color:var(--rose);font-family:'Space Mono',monospace;}
  .desc{font-size:14px;opacity:.8;max-width:440px;margin-bottom:24px;}

  .qty-row{display:flex;align-items:center;gap:16px;margin-bottom:22px;}
  .qty-box{display:flex;align-items:center;border:1px solid var(--ink);border-radius:2px;}
  .qty-box button{width:36px;height:36px;background:none;border:none;font-size:16px;cursor:pointer;}
  .qty-box span{width:32px;text-align:center;font-family:'Space Mono',monospace;font-size:14px;}

  .btn-row{display:flex;gap:12px;margin-bottom:28px;flex-wrap:wrap;}
  .btn{display:inline-block;padding:14px 26px;font-size:12px;letter-spacing:.06em;text-transform:uppercase;border-radius:2px;cursor:pointer;border:1px solid var(--ink);transition:all .2s;font-family:'Work Sans';}
  .btn-dark{background:var(--ink);color:var(--ivory);}
  .btn-dark:hover{background:var(--rose);border-color:var(--rose);}
  .btn-outline{background:none;color:var(--ink);}
  .btn-outline:hover{background:var(--ink);color:var(--ivory);}

  .meta-list{border-top:1px solid rgba(33,26,29,.12);padding-top:18px;font-size:13px;}
  .meta-list div{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid rgba(33,26,29,.08);}
  .meta-list span:first-child{opacity:.6;}

  .confirm-banner{
    display:none;margin-top:16px;padding:12px 16px;background:var(--blush);
    border-radius:4px;font-size:13px;font-family:'Space Mono',monospace;
  }

  @media (max-width:760px){
    .product{grid-template-columns:1fr;gap:28px;}
  }

  @media (max-width:480px){
    .wrap{padding:0 18px;}
    .top-bar{padding:12px 18px;}
    .icons{font-size:11px;gap:10px;}
    .btn{padding:13px 18px;}
    .meta-list div{font-size:12px;}
  }

  footer{padding:44px 0 28px;text-align:center;font-size:12px;opacity:.7;}
  .hamburger-btn{background:none;border:none;font-size:22px;cursor:pointer;color:var(--ink);line-height:1;padding:0;margin:0;}
  .icon-row{display:flex;align-items:center;gap:18px;margin-left:auto;}
  .icon-btn{position:relative;display:flex;align-items:center;color:var(--ink);}
  .icon-btn svg{width:22px;height:22px;stroke:var(--ink);fill:none;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round;}
  .icon-badge{position:absolute;top:-7px;right:-9px;min-width:15px;height:15px;line-height:15px;text-align:center;background:var(--rose);color:var(--ivory);border-radius:50%;font-size:9px;padding:0 3px;}
  .menu-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:90;}
  .menu-overlay.open{display:block;}
  .side-menu{
    position:fixed;top:0;left:0;height:100%;width:270px;max-width:80vw;
    background:var(--ivory);z-index:100;transform:translateX(-100%);
    transition:transform .25s ease;box-shadow:4px 0 20px rgba(0,0,0,.15);
    display:flex;flex-direction:column;
  }
  .side-menu.open{transform:translateX(0);}
  .side-menu-head{display:flex;justify-content:space-between;align-items:center;padding:20px 22px;border-bottom:1px solid rgba(33,26,29,.1);}
  .side-menu-head span{font-family:'Fraunces',serif;font-size:16px;}
  .side-menu-close{background:none;border:none;font-size:20px;cursor:pointer;color:var(--ink);}
  .side-menu a{display:block;padding:16px 22px;font-size:14px;border-bottom:1px solid rgba(33,26,29,.06);color:var(--ink);}
  .side-menu a:hover{background:var(--blush);}
</style>
</head>
<body>

<header>
  <div class="top-bar">
    <button class="hamburger-btn" onclick="toggleMenu(true)" aria-label="Menu">☰</button>
    <a href="index.html" class="logo"><img src="logo.png?v=3" alt="Amore Lifestyle" style="height:38px;display:block;"></a>
    <div class="icon-row">
      <a href="wishlist.html" class="icon-btn" aria-label="Wishlist">
        <svg viewBox="0 0 24 24"><path d="M12 21s-7.5-4.6-10-9.3C.5 8 2 4.5 5.5 4 8 3.6 10 5 12 7c2-2 4-3.4 6.5-3 3.5.5 5 4 3.5 7.7C19.5 16.4 12 21 12 21z"/></svg>
        <span class="icon-badge wishlist-count">0</span>
      </a>
      <a href="account.html" class="icon-btn" aria-label="Account">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4.4 3.6-8 8-8s8 3.6 8 8"/></svg>
      </a>
      <a href="bag.html" class="icon-btn bag-link" aria-label="Bag">
        <svg viewBox="0 0 24 24"><path d="M6 8h12l-1 12H7L6 8z"/><path d="M9 8V6a3 3 0 016 0v2"/></svg>
        <span class="icon-badge bag-count">0</span>
      </a>
    </div>
  </div>
</header>

<div class="menu-overlay" id="menuOverlay" onclick="toggleMenu(false)"></div>
<div class="side-menu" id="sideMenu">
  <div class="side-menu-head">
    <span>Menu</span>
    <button class="side-menu-close" onclick="toggleMenu(false)">✕</button>
  </div>
  <a href="index.html">Home</a>
  <a href="categories.html">Categories</a>
  <a href="categories.html?sort=default">New Arrivals</a>
  <a href="categories.html?sort=bestseller">Best Sellers</a>
  <a href="contact.html">Contact Us</a>
  <a href="policy.html">Policy</a>
</div>
<script>
  function toggleMenu(open){
    document.getElementById('sideMenu').classList.toggle('open', open);
    document.getElementById('menuOverlay').classList.toggle('open', open);
  }
</script>

<div class="wrap breadcrumb">
  <a href="index.html">Home</a> / <a href="categories.html">Shop</a> / <span id="crumbCat"></span>
</div>

<div class="wrap product" id="productArea">
  <!-- filled by JS -->
</div>

<footer>
  <div class="wrap">© 2026 Amore Lifestyle · Ahmedabad, Gujarat, India</div>
</footer>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
<script src="cart.js?v=3"></script>
<script>
  let PRODUCTS = [];
  let product = null;
  let images = null;
  let qty = 1;

  fetch('data/products.json?v=' + Date.now())
    .then(r => r.json())
    .then(data => {
      PRODUCTS = data.products;
      initProduct();
    })
    .catch(() => {
      document.getElementById('productArea').innerHTML = '<p style="opacity:.6;">Could not load this product right now.</p>';
    });

  function initProduct(){
    // ---- Find the product from ?id= in the URL ----
    const params = new URLSearchParams(window.location.search);
    const id = parseInt(params.get('id'), 10);
    product = PRODUCTS.find(p => p.id === id) || PRODUCTS[0];

    document.title = product.name + " | Amore Lifestyle";
    document.getElementById('crumbCat').innerHTML = `<a href="categories.html?cat=${product.category}">${product.categoryLabel}</a> / ${product.subcategoryLabel}`;

    // Real MRP set per product (falls back to a 15% markup only if not set yet).
    const wasPrice = product.mrp || Math.round(product.price * 1.15 / 10) * 10;

    // ---- Photos: if a product has real photos (product.images = ['photo1.jpg', ...]),
    // they'll show here as a gallery with thumbnails. Until real photos are added,
    // it falls back to a single placeholder colour block. ----
    images = (product.images && product.images.length) ? product.images : null;

    const mainImageHtml = images
      ? `<img src="${images[0]}" alt="${product.name}" id="mainImg">`
      : '';

    const thumbHtml = images && images.length > 1
      ? `<div class="thumb-row">${images.map((src, i) => `
          <div class="thumb${i === 0 ? ' active' : ''}" onclick="swapImage(${i}, this)">
            <img src="${src}" alt="${product.name} photo ${i + 1}">
          </div>`).join('')}</div>`
      : '';

    document.getElementById('productArea').innerHTML = `
      <div class="product-gallery">
        <div class="product-img ${images ? '' : product.swatch}">
          ${product.badge ? `<span class="badge">${product.badge}</span>` : ''}
          ${mainImageHtml}
        </div>
        ${thumbHtml}
      </div>
      <div class="info"></div>
    `;

    const description = product.description ||
      `A handpicked piece from our ${product.subcategoryLabel} collection — thoughtfully sourced and ready to gift or keep.`;

    document.querySelector('.info').innerHTML = `
        <div class="tag">${product.subcategoryLabel}</div>
        <h1>${product.name}</h1>
        <div class="price-row">
          <span class="price">₹ ${product.price.toLocaleString('en-IN')}</span>
          <span class="price-strike">₹ ${wasPrice.toLocaleString('en-IN')}</span>
          <span class="save">Save ${Math.round((1 - product.price/wasPrice)*100)}%</span>
        </div>
        <p class="desc">${description} Free shipping across Ahmedabad on orders above ₹999.</p>

        <div class="qty-row">
          <div class="qty-box">
            <button onclick="changeQty(-1)">−</button>
            <span id="qtyVal">1</span>
            <button onclick="changeQty(1)">+</button>
          </div>
          <span style="font-size:12px;opacity:.6;">In stock</span>
        </div>

        <div class="btn-row">
          <button class="btn btn-dark" onclick="buyNow()">Buy Now</button>
          <button class="btn btn-outline" onclick="handleAddToBag()">Add to Bag</button>
          <button class="btn btn-outline" id="wishBtn" onclick="handleWish()">${isWishlisted(product.id) ? '♥ Saved' : '♡ Save for later'}</button>
        </div>

        <div class="confirm-banner" id="confirmBanner"></div>

        <div class="meta-list">
          <div><span>Category</span><span>${product.categoryLabel} — ${product.subcategoryLabel}</span></div>
          ${product.dimensions ? `<div><span>Dimensions</span><span>${product.dimensions}</span></div>` : ''}
          ${product.capacity ? `<div><span>Capacity</span><span>${product.capacity}</span></div>` : ''}
          <div><span>Delivery</span><span>3–5 days, pan-India</span></div>
          <div><span>Returns</span><span>7-day easy returns</span></div>
        </div>
      </div>
    `;
  }

  function swapImage(i, el){
    document.getElementById('mainImg').src = images[i];
    el.parentElement.querySelectorAll('.thumb').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
  }

  // ---- Quantity control ----
  function changeQty(delta){
    qty = Math.max(1, qty + delta);
    document.getElementById('qtyVal').textContent = qty;
  }

  // ---- Add to Bag, using the shared bag stored in this browser ----
  function handleAddToBag(){
    addToBag(product.id, qty);
    showBanner(`Added ${qty} × ${product.name} to your bag.`);
  }

  function handleWish(){
    const nowSaved = toggleWishlist(product.id);
    document.getElementById('wishBtn').textContent = nowSaved ? '♥ Saved' : '♡ Save for later';
  }

  // ---- Buy Now: opens the real Razorpay payment window ----
  function buyNow(){
    openRazorpayCheckout({
      amountRupees: product.price * qty,
      description: `${qty} × ${product.name}`,
      onSuccess: function(paymentId){
        window.location.href = `order-success.html?payment_id=${paymentId}&amount=${product.price*qty}&item=${encodeURIComponent(qty + ' × ' + product.name)}`;
      }
    });
  }

  function showBanner(msg){
    const b = document.getElementById('confirmBanner');
    b.textContent = msg;
    b.style.display = 'block';
  }
</script>
</body>
</html>
