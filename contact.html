<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Us | Amore Lifestyle</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,500;0,600;1,400;1,500&family=Work+Sans:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{--ivory:#F3EFE8;--blush:#E6DFD1;--plum:#6E6E6E;--rose:#6E6E6E;--gold:#A68A5B;--ink:#2B2B2A;}
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{overflow-x:hidden;max-width:100%;}
  body{background:var(--ivory);color:var(--ink);font-family:'Work Sans',sans-serif;line-height:1.6;}
  h1,h2{font-family:'Fraunces',serif;font-weight:500;letter-spacing:-0.01em;}
  a{color:inherit;text-decoration:none;}
  .wrap{max-width:640px;margin:0 auto;padding:0 32px;}

  header{position:sticky;top:0;z-index:50;background:var(--ivory);border-bottom:1px solid rgba(33,26,29,.1);}
  .top-bar{display:flex;align-items:center;gap:16px;padding:14px 32px;max-width:1240px;margin:0 auto;}
  .logo img{height:38px;display:block;}
  .hamburger-btn{background:none;border:none;font-size:22px;cursor:pointer;color:var(--ink);}

  .page-head{padding:30px 0 10px;}
  .page-head .tag{font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--rose);}
  .page-head h1{font-size:clamp(24px,3vw,32px);margin-top:6px;}

  .contact-card{background:#fff;border-radius:8px;padding:24px;margin:24px 0;box-shadow:0 2px 14px rgba(33,26,29,.06);}
  .contact-row{display:flex;align-items:center;gap:14px;padding:14px 0;border-bottom:1px solid rgba(33,26,29,.08);}
  .contact-row:last-child{border-bottom:none;}
  .contact-row svg{width:22px;height:22px;stroke:var(--rose);fill:none;stroke-width:1.6;flex:0 0 auto;}
  .contact-row div strong{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.05em;opacity:.55;margin-bottom:3px;}
  .contact-row div span{font-size:14px;}
  .btn{display:inline-block;padding:13px 26px;font-size:12px;letter-spacing:.06em;text-transform:uppercase;border-radius:2px;cursor:pointer;border:1px solid var(--ink);background:var(--ink);color:var(--ivory);margin-top:6px;}
  .btn:hover{background:var(--rose);border-color:var(--rose);}

  footer{padding:44px 0 28px;text-align:center;font-size:12px;opacity:.7;}
</style>
</head>
<body>

<header>
  <div class="top-bar">
    <button class="hamburger-btn" onclick="history.back()" aria-label="Back">←</button>
    <a href="index.html" class="logo"><img src="logo.png?v=3" alt="Amore Lifestyle"></a>
  </div>
</header>

<div class="wrap page-head">
  <div class="tag">We're here to help</div>
  <h1>Contact Us</h1>
</div>

<div class="wrap">
  <div class="contact-card">
    <div class="contact-row">
      <svg viewBox="0 0 24 24"><path d="M21 11.5a8.38 8.38 0 01-.9 3.8 8.5 8.5 0 01-7.6 4.7 8.38 8.38 0 01-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 01-.9-3.8 8.5 8.5 0 014.7-7.6 8.38 8.38 0 013.8-.9h.5a8.48 8.48 0 018 8v.5z"/></svg>
      <div>
        <strong>WhatsApp</strong>
        <span><a href="https://wa.me/919909444006" target="_blank">+91 99094 44006</a></span>
      </div>
    </div>
    <div class="contact-row">
      <svg viewBox="0 0 24 24"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1"/></svg>
      <div>
        <strong>Instagram</strong>
        <span><a href="https://www.instagram.com/archiesmaninagar/" target="_blank">@archiesmaninagar</a></span>
      </div>
    </div>
    <div class="contact-row">
      <svg viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3 7l9 6 9-6"/></svg>
      <div>
        <strong>Email</strong>
        <span><a href="mailto:hello@amorelifestyle.in">hello@amorelifestyle.in</a></span>
      </div>
    </div>
    <div class="contact-row">
      <svg viewBox="0 0 24 24"><path d="M21 10c0 6-9 12-9 12s-9-6-9-12a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
      <div>
        <strong>Location</strong>
        <span><a href="https://www.google.com/maps/search/?api=1&query=Archies+Gift+%26+Home+Decor%2C+Maninagar%2C+Ahmedabad" target="_blank">Maninagar, Ahmedabad — Get Directions</a></span>
      </div>
    </div>
    <div class="contact-row">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg>
      <div>
        <strong>Hours</strong>
        <span>Mon–Sat, 10 AM – 8 PM</span>
      </div>
    </div>
  </div>

  <div style="display:flex;gap:12px;flex-wrap:wrap;">
    <a href="https://wa.me/919909444006" target="_blank" class="btn">Message Us on WhatsApp</a>
    <a href="https://www.instagram.com/archiesmaninagar/" target="_blank" class="btn" style="background:none;color:var(--ink);">Follow on Instagram</a>
  </div>
</div>

<footer>
  <div class="wrap">© 2026 Amore Lifestyle · Ahmedabad, Gujarat, India</div>
</footer>

</body>
</html>
